spring.application.name=backend
spring.config.import=optional:file:./application-secrets.properties,optional:classpath:application-secrets.properties

# This will default to the environment variable GEMINI_API_KEY if set, 
# otherwise it will try to find gemini.api.key in application-secrets.properties
gemini.api.key=${GEMINI_API_KEY:}

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:scanner-history.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# Security: Limit upload size to 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,https://pdf-prompt-scanner.vercel.app}

# Security Configurations
app.admin.api-key=${ADMIN_API_KEY:default-admin-key}
app.scan.max-pages=50
app.scan.rate-limit-rpm=10

